<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - HomeHub</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #06b6d4;
            --success: #10b981;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e1e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 20px; }
        header { background: var(--surface); padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--primary); font-weight: 700; font-size: 1.3rem; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        h1 { font-size: 2rem; margin-bottom: 2rem; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .metric-label { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .metric-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
        .metric-change { color: var(--success); font-size: 0.9rem; }
        .chart { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
        .chart-title { font-size: 1.2rem; margin-bottom: 1.5rem; color: var(--text-primary); font-weight: 600; }
        .bar { background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%); height: 40px; border-radius: 4px; margin-bottom: 1rem; }
        @media (max-width: 768px) { .metrics { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="analytics.html" class="logo">
                <div class="logo-img">H</div>
                HomeHub
            </a>
        </div>
    </header>

    <div class="container">
        <h1>📈 Analytics Dashboard</h1>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-label">Total Revenue</div>
                <div class="metric-value">KES 577,500</div>
                <div class="metric-change">↑ 15% from last month</div>
            </div>
            <div class="metric">
                <div class="metric-label">Collections</div>
                <div class="metric-value">15</div>
                <div class="metric-change">↑ 2 from last month</div>
            </div>
            <div class="metric">
                <div class="metric-label">Avg Payment Time</div>
                <div class="metric-value">2.3 days</div>
                <div class="metric-change">↓ Improved</div>
            </div>
            <div class="metric">
                <div class="metric-label">Collection Rate</div>
                <div class="metric-value">92%</div>
                <div class="metric-change">↑ 5% improvement</div>
            </div>
        </div>

        <div class="chart">
            <div class="chart-title">Monthly Collections Trend</div>
            <div style="height: 30px; margin-bottom: 1.5rem;"></div>
            <div style="margin-bottom: 2rem;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <span style="width: 60px; color: var(--text-secondary);">January</span>
                    <div style="flex: 1; background: var(--bg); height: 25px; border-radius: 4px;">
                        <div style="width: 73%; height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 4px;"></div>
                    </div>
                    <span style="width: 80px; text-align: right;">KES 460K</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <span style="width: 60px; color: var(--text-secondary);">February</span>
                    <div style="flex: 1; background: var(--bg); height: 25px; border-radius: 4px;">
                        <div style="width: 76%; height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 4px;"></div>
                    </div>
                    <span style="width: 80px; text-align: right;">KES 475K</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <span style="width: 60px; color: var(--text-secondary);">March</span>
                    <div style="flex: 1; background: var(--bg); height: 25px; border-radius: 4px;">
                        <div style="width: 78%; height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 4px;"></div>
                    </div>
                    <span style="width: 80px; text-align: right;">KES 490K</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="width: 60px; color: var(--text-secondary);">June</span>
                    <div style="flex: 1; background: var(--bg); height: 25px; border-radius: 4px;">
                        <div style="width: 92%; height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 4px;"></div>
                    </div>
                    <span style="width: 80px; text-align: right;">KES 578K</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
