<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - HomeHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e1e8f0;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); }
        .chat-container { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1rem; overflow-y: auto; }
        .main { display: flex; flex-direction: column; }
        .chat-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.5rem; }
        .chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .chat-input { background: var(--surface); border-top: 1px solid var(--border); padding: 1rem; display: flex; gap: 0.5rem; }
        .conversation { padding: 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.3s; }
        .conversation:hover { background: var(--bg); }
        .conversation.active { background: rgba(99, 102, 241, 0.1); }
        .message { margin-bottom: 1rem; display: flex; }
        .message.sent { justify-content: flex-end; }
        .message-bubble { max-width: 70%; padding: 0.8rem 1rem; border-radius: 8px; }
        .message.received .message-bubble { background: var(--bg); color: var(--text-primary); }
        .message.sent .message-bubble { background: var(--primary); color: white; }
        input { flex: 1; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px; }
        button { padding: 0.8rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) {
            .chat-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <h3 style="margin-bottom: 1rem;">Messages</h3>
            <div class="conversation active">
                <div style="font-weight: 600;">James Kipchoge</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">Last message</div>
            </div>
            <div class="conversation">
                <div style="font-weight: 600;">Neighbourhood Group</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">2 unread</div>
            </div>
        </div>

        <div class="main">
            <div class="chat-header">
                <h2>James Kipchoge</h2>
                <p style="color: var(--text-secondary); margin-top: 0.3rem;">Property Manager</p>
            </div>

            <div class="chat-messages">
                <div class="message received">
                    <div class="message-bubble">Hi Sarah, just checking in on rent payment status</div>
                </div>
                <div class="message sent">
                    <div class="message-bubble">Hi James, I'll pay by end of week</div>
                </div>
                <div class="message received">
                    <div class="message-bubble">Perfect! Let me know once it's done</div>
                </div>
            </div>

            <div class="chat-input">
                <input type="text" placeholder="Type a message...">
                <button>Send</button>
            </div>
        </div>
    </div>
</body>
</html>
