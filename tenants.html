<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenants - HomeHub</title>
    <style>
        :root { --primary: #6366f1; --bg: #f5f7fa; --surface: #ffffff; --text-primary: #1e293b; --text-secondary: #64748b; --border: #e1e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 20px; }
        header { background: var(--surface); padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--primary); font-weight: 700; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        h1 { font-size: 2rem; margin-bottom: 2rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg); padding: 1rem; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); }
        tr:hover { background: var(--bg); }
        .status { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 15px; font-size: 0.8rem; font-weight: 600; }
        .status-paid { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        @media (max-width: 768px) { table { font-size: 0.85rem; } th, td { padding: 0.7rem; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="dashboard-homeowner.html" class="logo">
                <div class="logo-img">H</div>
                HomeHub
            </a>
        </div>
    </header>

    <div class="container">
        <h1>👥 My Tenants</h1>
        
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Unit</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sarah Mwangi</td>
                        <td>Unit 104</td>
                        <td>+254 712 345678</td>
                        <td><span class="status status-paid">Paid</span></td>
                        <td><a href="#" style="color: var(--primary); text-decoration: none;">Message</a></td>
                    </tr>
                    <tr>
                        <td>John Kipchoge</td>
                        <td>Unit 205</td>
                        <td>+254 701 234567</td>
                        <td><span class="status status-paid">Paid</span></td>
                        <td><a href="#" style="color: var(--primary); text-decoration: none;">Message</a></td>
                    </tr>
                    <tr>
                        <td>Alice Mwali</td>
                        <td>Unit 301</td>
                        <td>+254 723 456789</td>
                        <td><span class="status status-pending">Pending</span></td>
                        <td><a href="#" style="color: var(--primary); text-decoration: none;">Message</a></td>
                    </tr>
                    <tr>
                        <td>David Okonkwo</td>
                        <td>Unit 102</td>
                        <td>+254 734 567890</td>
                        <td><span class="status status-paid">Paid</span></td>
                        <td><a href="#" style="color: var(--primary); text-decoration: none;">Message</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
