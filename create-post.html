<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - HomeHub</title>
    <style>
        :root { --primary: #6366f1; --bg: #f5f7fa; --surface: #ffffff; --text-primary: #1e293b; --text-secondary: #64748b; --border: #e1e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem 20px; }
        header { background: var(--surface); padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--primary); font-weight: 700; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        h1 { font-size: 2rem; margin-bottom: 2rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
        textarea { width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem; resize: vertical; min-height: 150px; }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .button-group { display: flex; gap: 1rem; margin-top: 1.5rem; }
        button { flex: 1; padding: 0.85rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--border); color: var(--text-primary); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="neighbourhood.html" class="logo">
                <div class="logo-img">H</div>
                HomeHub
            </a>
        </div>
    </header>

    <div class="container">
        <h1>Create a Post</h1>
        <div class="card">
            <textarea placeholder="Share something with your community..."></textarea>
            <div class="button-group">
                <button class="btn-primary">Post</button>
                <button class="btn-secondary" onclick="window.history.back()">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
